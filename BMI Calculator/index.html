<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div>
      <h2>BMI Calculator</h2>
      <p class="text">Height</p>
      <input type="text" placeholder="Cm" id="height" />
      <p class="text">Weight</p>
      <input type="text" placeholder="Kg" id="weight" />
      <p id="result"></p>
      <button id="btn" onclick="bmi()">Calculate</button>
      <button id="clear">Clear</button>
      <p id="info">Please enter height [cm] and weight [kg]</p>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
